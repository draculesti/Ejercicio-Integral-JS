<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenidxs!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/global.css">
</head>

<body class="d-flex flex-column min-vh-100 ">

    <nav id="mainNavbar" class="navbar navbar-expand-md bg-body-tertiary">
        
    </nav>

    <h1 class="my-4 px-3">Feed de productos</h1>

    <div id="topProduct" class="container"></div>

    <main class="container my-2 py-3 flex-grow-1">

        <div class="row g-4 align-items-start">

            <!-- Columna izquierda: imagen principal + miniaturas -->
            <div class="col-12 col-md-5 col-lg-5">
                <img src="./assets/kit-img.png" alt="kit cuidado personal" class="img-fluid border rounded">

                <!-- Miniaturas -->
                <div id="miniImg" class="row g-2 mt-2 justify-content-start">
                    <div class="col-3 col-sm-2 col-md-3">
                        <img src="./assets/kit-img.png" alt="imagen miniatura" class="img-fluid border rounded">
                    </div>
                    <div class="col-3 col-sm-2 col-md-3">
                        <img src="./assets/kit-img.png" alt="imagen miniatura" class="img-fluid border rounded">
                    </div>
                    <div class="col-3 col-sm-2 col-md-3">
                        <img src="./assets/kit-img.png" alt="imagen miniatura" class="img-fluid border rounded">
                    </div>
                </div>
            </div>

            <!-- Columna derecha: info del producto -->
            <div id="prodDescription" class="col-12 col-md-7 col-lg-7">

                <!-- Título + badge de estado -->
                <div class="d-flex align-items-start justify-content-between gap-3 mb-2">
                    <h3 id="prodTitle" class="mb-0">Kit de cuidado personal</h3>
                    <button id="statusBadge" type="button" class="btn btn-success flex-shrink-0">Disponible</button>
                </div>

                <!-- Precio -->
                <p class="fs-4 fw-bold mb-3">$ 99.99</p>

                <!-- Descripción corta -->
                <div id="description" class="text-start mb-3">
                    Kit básico para el cuidado de la piel. Uso diario.
                </div>

                <!-- Mostrar más -->
                <button id="showDescription" type="button" class="btn btn-outline-secondary mb-4">
                    Mostrar más...
                </button>

                <hr>

                <!-- Botones de acción -->
                <div class="d-flex flex-wrap gap-2 mt-3">
                    <!-- Botón para agregar likes al producto -->
                    <button id="likeBtn" type="button" class="btn btn-outline-danger">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            class="bi bi-heart-fill" viewBox="0 0 16 16">
                            <path fill-rule="evenodd"
                                d="M8 1.314C12.438-3.248 23.534 4.735 8 15-7.534 4.736 3.562-3.248 8 1.314" />
                        </svg>
                        Me gusta
                    </button>
                    <!-- Cambia disponibilidad -->
                    <button id="changeStatus" type="button" class="btn btn-outline-secondary">Cambiar
                        disponibilidad</button>
                    <!-- Agrega al carrito y cambia disponibilidad a apartado -->
                    <button id="cartBtn" type="button" class="btn btn-primary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            class="bi bi-cart" viewBox="0 0 16 16">
                            <path
                                d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .491.592l-1.5 8A.5.5 0 0 1 13 12H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5M3.102 4l1.313 7h8.17l1.313-7zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4m7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2m7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2" />
                        </svg>
                        Agregar al carrito
                    </button>
                </div>

            </div>
        </div>
    </main>

    <!-- Sección de comentarios -->
    <section class="container my-3 py-3">
        <h4 class="mb-3">Comentarios</h4>

        <div class="row">
            <!-- Se oculta este texto cuando haya al menos un comentario -->
            <div id="commentsMessage" class="col-12 text-center py-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor"
                    class="bi bi-chat-dots mb-2" viewBox="0 0 16 16" style="display: block; margin: 0 auto;">
                    <path
                        d="M5 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0m4 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0m3 1a1 1 0 1 0 0-2 1 1 0 0 0 0 2" />
                    <path
                        d="m2.165 15.803.02-.004c1.83-.363 2.948-.842 3.468-1.105A9 9 0 0 0 8 15c4.418 0 8-3.134 8-7s-3.582-7-8-7-8 3.134-8 7c0 1.76.743 3.37 1.97 4.6a10.4 10.4 0 0 1-.524 2.318l-.003.011a11 11 0 0 1-.244.637c-.079.186.074.394.273.362a22 22 0 0 0 .693-.125m.8-3.108a1 1 0 0 0-.287-.801C1.618 10.83 1 9.468 1 8c0-3.192 3.004-6 7-6s7 2.808 7 6-3.004 6-7 6a8 8 0 0 1-2.088-.272 1 1 0 0 0-.711.074c-.387.196-1.24.57-2.634.893a11 11 0 0 0 .398-2" />
                </svg>
                <p class="text-center mt-2">Aún no hay ningún comentario.
                    <br>
                    ¡Deja tu opinión sobre este producto!
                </p>
            </div>
            <!-- Aquí se van a insertar los comentarios -->
            <div id="commentSection" class="col-12"></div>
        </div>

        <hr>

        <!-- Formulario de comentario -->
        <form class="row align-items-center g-2 mt-1">
            <div class="col-auto">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="currentColor"
                    class="bi bi-person-circle" viewBox="0 0 16 16">
                    <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0" />
                    <path fill-rule="evenodd"
                        d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1" />
                </svg>
            </div>
            <!-- De aquí se va a tomar el texto para insertar el comentario -->
            <div class="col-12 col-sm">
                <label for="commentIpt" class="visually-hidden">Escribe un comentario</label>
                <input id="commentIpt" type="text" class="form-control" placeholder="Escribe tu comentario...">
            </div>
            <!-- Este botón publica el comentario -->
            <div class="col-12 col-sm-auto">
                <button id="postComment" type="submit" class="btn btn-primary w-100">Publicar comentario</button>
            </div>
        </form>
    </section>

    <!-- Estadísticas del producto -->
    <section class="container my-3 py-2">
        <h4 style="display: none;">Datos dinámicos</h4>
        <div class="row text-center">
            <div class="col-12 col-md-4 py-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-heart"
                    viewBox="0 0 16 16">
                    <path
                        d="m8 2.748-.717-.737C5.6.281 2.514.878 1.4 3.053c-.523 1.023-.641 2.5.314 4.385.92 1.815 2.834 3.989 6.286 6.357 3.452-2.368 5.365-4.542 6.286-6.357.955-1.886.838-3.362.314-4.385C13.486.878 10.4.28 8.717 2.01zM8 15C-7.333 4.868 3.279-3.04 7.824 1.143q.09.083.176.171a3 3 0 0 1 .176-.17C12.72-3.042 23.333 4.867 8 15" />
                </svg>
                <p class="mb-1 mt-1">Me gusta</p>
                <!-- Este contador cambia cuando se hace click en el botón "me gusta" -->
                <p id="likeCounter" class="fw-bold fs-5 mb-0">0</p>
            </div>
            <div class="col-12 col-md-4 py-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                    class="bi bi-calendar3" viewBox="0 0 16 16">
                    <path
                        d="M14 0H2a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2M1 3.857C1 3.384 1.448 3 2 3h12c.552 0 1 .384 1 .857v10.286c0 .473-.448.857-1 .857H2c-.552 0-1-.384-1-.857z" />
                    <path
                        d="M6.5 7a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m-9 3a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m-9 3a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2" />
                </svg>
                <p class="mb-1 mt-1">Publicado el</p>
                <p class="fw-bold fs-5 mb-0">12/04/2026</p>
            </div>
            <div class="col-12 col-md-4 py-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-tag"
                    viewBox="0 0 16 16">
                    <path d="M6 4.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0m-1 0a.5.5 0 1 0-1 0 .5.5 0 0 0 1 0" />
                    <path
                        d="M2 1h4.586a1 1 0 0 1 .707.293l7 7a1 1 0 0 1 0 1.414l-4.586 4.586a1 1 0 0 1-1.414 0l-7-7A1 1 0 0 1 1 6.586V2a1 1 0 0 1 1-1m0 5.586 7 7L13.586 9l-7-7H2z" />
                </svg>
                <p class="mb-1 mt-1">Estado</p>
                <!-- Cambia el color y texto según el estado que se muestre arriba -->
                <p id="statusTxt" class="fw-bold fs-5 mb-0">Disponible</p>
            </div>
        </div>
    </section>

    <footer class="container-fluid py-3 mt-auto" id="mainFooter">
    </footer>

    <script src="./javascript/main.js" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
